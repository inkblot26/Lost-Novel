<!DOCTYPE html>
<html>
<head>
    <title>World Map</title>

    <style>
        /* =====================================================
           1. BASE STYLE
        ===================================================== */
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #f5f5f5;
            color: #111;
            line-height: 1.7;
            text-align: center;
        }

        /* =====================================================
           2. DARK MODE
        ===================================================== */
        body.dark {
            background-color: #0f0f0f;
            color: #e6e6e6;
        }

        body.dark img {
            border-color: #333;
        }

        body.dark .description {
            color: #bbb;
        }

        /* =====================================================
           3. TOP BAR (MATCH CHAPTER.HTML STYLE)
        ===================================================== */
        .top-bar {
            position: sticky;
            top: 0;

            background: #ffffff;
            border-bottom: 1px solid #ddd;

            padding: 10px 15px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            z-index: 50;
        }

        body.dark .top-bar {
            background: #121212;
            border-bottom: 1px solid #333;
        }

        /* LEFT SIDE TITLE AREA */
        .book-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .book-title {
            font-weight: bold;
            font-size: 14px;
            color: inherit;
            text-decoration: none;
        }

        .book-title:hover {
            opacity: 0.7;
        }

        .chapter-title {
            font-size: 13px;
            opacity: 0.7;
        }

        /* TOP RIGHT BUTTONS */
        .top-buttons button {
            margin-left: 10px;
            padding: 6px 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        /* =====================================================
           4. CONTENT AREA
        ===================================================== */
        h1 {
            font-size: 48px;
            margin: 40px 0 20px;
        }

        .map-container {
            max-width: 1000px;
            margin: auto;
        }

        img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid #ccc;
        }

        .description {
            max-width: 800px;
            margin: 40px auto 0;
            font-size: 18px;
            color: #333;
        }

        /* =====================================================
           5. BUTTONS (MATCH CHAPTER STYLE)
        ===================================================== */
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;

            background: #111;
            color: #fff;

            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        body.dark .btn {
            background: #fff;
            color: #000;
        }

        /* =====================================================
           6. TOGGLE BUTTON
        ===================================================== */
        .toggle {
            position: fixed;
            top: 15px;
            right: 15px;

            padding: 10px 15px;
            cursor: pointer;

            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        /* =====================================================
           7. LORE DROPDOWN (TOP BAR MENU)
           Reuses chapter dropdown styling style
        ===================================================== */
        
        .chapter-wrapper {
            position: relative;
            display: inline-block;
        }
        
        /* dropdown box */
        .chapter-panel {
            position: absolute;
            top: 40px;
            left: 0;
        
            width: 240px;
            max-height: 300px;
            overflow-y: auto;
        
            background: rgba(255,255,255,0.98);
            border: 1px solid #ddd;
            border-radius: 8px;
        
            padding: 10px;
            display: none;
        
            text-align: left;
            z-index: 200;
        }
        
        body.dark .chapter-panel {
            background: rgba(30,30,30,0.98);
            border: 1px solid #333;
        }
        
        /* links inside dropdown */
        .chapter-panel a {
            display: block;
            padding: 6px 8px;
        
            text-decoration: none;
            color: #111;
            border-radius: 5px;
        }
        
        body.dark .chapter-panel a {
            color: #e6e6e6;
        }
        
        .chapter-panel a:hover {
            background: rgba(0,0,0,0.05);
        }
        
        body.dark .chapter-panel a:hover {
            background: rgba(255,255,255,0.08);
        }
        
    </style>
</head>

<body>

<!-- =====================================================
     TOP BAR (MATCH CHAPTER SYSTEM)
===================================================== -->
<div class="top-bar">

    <!-- LEFT: SITE TITLE -->
    <div class="book-info">
        <a class="book-title" href="/Lost-Novel/">
            Lost: Ashes of Vengeance
        </a>
    </div>

    <!-- RIGHT: CONTROLS -->
    <div class="top-buttons">
    
        <!-- LORE DROPDOWN -->
        <div class="chapter-wrapper">
    
            <button onclick="toggleLoreList()">
                📚 Lore
            </button>
    
            <div id="lorePanel" class="chapter-panel"></div>
    
        </div>
    
        <!-- DARK MODE -->
        <button onclick="toggleMode()">🌙 / ☀</button>
    
    </div>

</div>

<!-- DARK MODE TOGGLE (optional floating button) -->
<button class="toggle" onclick="toggleMode()">🌙 / ☀️</button>

<!-- =====================================================
     PAGE CONTENT
===================================================== -->

<h1>World Map</h1>

<div class="map-container">
    <img src="/Lost-Novel/lore/Lost World.jpg" alt="World Map">
</div>

<div class="description">
    This map represents the known world after the collapse of civilization.
</div>

<!-- HOME BUTTON (MATCH CHAPTER STYLE) -->
<a class="btn" href="/Lost-Novel/">
    ← Back to Home
</a>

<!-- =====================================================
     DARK MODE SCRIPT
===================================================== -->
<script>
    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
    }
    
    function toggleMode() {
        document.body.classList.toggle("dark");
    
        if (document.body.classList.contains("dark")) {
            localStorage.setItem("mode", "dark");
        } else {
            localStorage.setItem("mode", "light");
        }
    }

    function toggleLoreList() {
        const panel = document.getElementById("lorePanel");
    
        if (panel.style.display === "block") {
            panel.style.display = "none";
        } else {
            panel.style.display = "block";
            loadLoreList();
        }
    }

    function loadLoreList() {
        const lore = [
            {
                name: "List of Primeflora",
                link: "/Lost-Novel/lore/primeflora.html"
            },
            {
                name: "List of Wildborn",
                link: "/Lost-Novel/lore/wildborn.html"
            },
            
            {
                name: "Verdant Echo",
                link: "/Lost-Novel/lore/echosystem.html"
            },
            {
                name: "World Map",
                link: "/Lost-Novel/lore/worldmap.html"
            }, 
        ];
    
        let html = "";
    
        lore.forEach(item => {
            html += `
                <a href="${item.link}">
                    ${item.name}
                </a>
            `;
        });
        document.getElementById("lorePanel").innerHTML = html;
    }
    
</script>

</body>
</html>
