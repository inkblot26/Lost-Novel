<!DOCTYPE html>
<html>
<head>
    <title>Lost: Ashes of Vengeance</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #f5f5f5;
            color: #111;
            line-height: 1.7;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #ffffff, #dcdcdc);
            z-index: -1;
        }

        .container {
            max-width: 850px;
            margin: auto;
            padding: 60px 20px;
        }

        .title-block {
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            font-size: 48px;
        }

        .author {
            color: #666;
        }

        .btn {
            display: block;
            width: fit-content;
            margin: 30px auto;
            padding: 14px 28px;
            background: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .section {
            margin-top: 50px;
        }

        #chapterList {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 40px;
            margin-top: 20px;
        }

        .chapter-item a {
            text-decoration: none;
            color: #111;
        }
    </style>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <div class="title-block">
        <h1>Lost: Ashes of Vengeance</h1>
        <p class="author">by Inkblot</p>
    </div>

    <!-- ✅ FIXED BUTTON -->
    <a class="btn" href="#" id="mainButton" onclick="openChapter(event)">
        Loading...
    </a>

    <div class="section">
        <h2>Chapter List</h2>
        <div id="chapterList"></div>
    </div>

</div>

<script>
/* =========================
   FIXED CHAPTER SYSTEM
========================= */

// IMPORTANT: correct format (chapter.html + txt file)
const firstChapter = "/Lost-Novel/chapter.html?file=/Lost-Novel/book1/ch001.txt";

/* =========================
   BUTTON TEXT
========================= */
function updateButton() {
    let lastChapter = localStorage.getItem("lastChapter");
    let btn = document.getElementById("mainButton");

    if (lastChapter && lastChapter !== "null") {
        btn.innerText = "Continue Reading";
    } else {
        btn.innerText = "Read Chapter 1";
    }
}

/* =========================
   OPEN CHAPTER
========================= */
function openChapter(event) {
    event.preventDefault();

    let lastChapter = localStorage.getItem("lastChapter");

    if (lastChapter && lastChapter !== "null") {
        window.location.href = lastChapter;
    } else {
        window.location.href = firstChapter;
    }
}

/* run button update */
updateButton();

/* =========================
   LOAD CHAPTER LIST
========================= */
fetch("/Lost-Novel/book1/chaplist.txt")
.then(res => res.text())
.then(text => {
    const list = document.getElementById("chapterList");

    const lines = text.trim().split("\n");

    let html = "";

    lines.forEach(line => {
        const [file, title] = line.split("|");

        html += `
            <div class="chapter-item">
                <a href="/Lost-Novel/chapter.html?file=/Lost-Novel/book1/${file.trim()}">
                    ${title.trim()}
                </a>
            </div>
        `;
    });

    list.innerHTML = html;
});

</script>

</body>
</html>
