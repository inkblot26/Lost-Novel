<!DOCTYPE html>
<html>
<head>
    <title>Chapter Reader</title>

    <!-- =====================================================
         1. BASE + LAYOUT STYLES
         Controls general look of the reader
    ===================================================== -->
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            color: #222;
            font-family: Georgia, serif;
        }

        /* =========================
           TOP BAR (HEADER)
           Shows book title + chapter title + buttons
        ========================= */
        .top-bar {
            position: sticky;
            top: 0;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        body.dark .top-bar {
            background: #121212;
            border-bottom: 1px solid #333;
        }

        .book-info {
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-weight: bold;
            font-size: 14px;
            color: inherit;
            text-decoration: none;
        }

        .book-title:hover {
            opacity: 0.7;
        }

        .chapter-title {
            font-size: 13px;
            opacity: 0.7;
        }

        /* Top buttons (settings, chapters, mode) */
        .top-buttons button {
            margin-left: 10px;
            padding: 6px 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        /* =========================
           MAIN READER AREA
        ========================= */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            font-size: 24px;
            line-height: 1.8;
        }

        .chapter {
            white-space: pre-wrap;
            text-align: justify;

            /* Disable selection (optional reading experience choice) */
            user-select: none;
            cursor: default;
        }

        /* =========================
           NAVIGATION BUTTONS
        ========================= */
        .nav {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .nav a {
            text-decoration: none;
            color: #111;
        }

        body.dark .nav a {
            color: #e6e6e6;
        }

        /* =========================
           DARK MODE GLOBAL STYLE
        ========================= */
        body.dark {
            background-color: #0f0f0f;
            color: #e6e6e6;
        }

        body.dark h1 {
            color: #fff;
        }

        /* =========================
           SETTINGS PANEL
        ========================= */
        .reader-settings {
            position: fixed;
            top: 60px;
            right: 15px;
            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            z-index: 100;
        }

        body.dark .reader-settings {
            background: rgba(30,30,30,0.95);
        }

        /* =========================
           CHAPTER DROPDOWN PANEL
        ========================= */
        .chapter-wrapper {
            position: relative;
            display: inline-block;
        }

        .chapter-panel {
            position: absolute;
            top: 40px;
            left: 0;
            width: 280px;
            max-height: 70vh;
            overflow-y: auto;

            background: rgba(255,255,255,0.98);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;

            display: none;
            z-index: 200;
        }

        body.dark .chapter-panel {
            background: rgba(30,30,30,0.98);
            border: 1px solid #333;
        }

        .chapter-panel a {
            display: block;
            padding: 6px 8px;
            text-decoration: none;
            color: #111;
            border-radius: 5px;
        }

        .chapter-panel a:hover {
            background: rgba(0,0,0,0.05);
        }

        body.dark .chapter-panel a {
            color: #e6e6e6;
        }

        body.dark .chapter-panel a:hover {
            background: rgba(255,255,255,0.08);
        }
    </style>
</head>

<body>

<!-- =====================================================
     2. TOP BAR UI (BOOK INFO + CONTROLS)
===================================================== -->
<div class="top-bar">

    <!-- Book + Chapter Title -->
    <div class="book-info">
        <a href="/Lost-Novel/" class="book-title">
            Lost: Ashes of Vengeance
        </a>
        <div id="topChapterTitle" class="chapter-title">
            Loading...
        </div>
    </div>

    <!-- Buttons (chapters, settings, mode) -->
    <div class="top-buttons">

        <!-- Chapter Dropdown -->
        <div class="chapter-wrapper">
            <button onclick="toggleChapterList()">📖 Chapters</button>
            <div id="chapterPanel" class="chapter-panel"></div>
        </div>

        <button onclick="toggleSettings()">⚙ Settings</button>
        <button onclick="toggleMode()">🌙 / ☀</button>

    </div>
</div>

<!-- =====================================================
     3. SETTINGS PANEL (FONT / SIZE / WIDTH)
===================================================== -->
<div class="reader-settings" id="settingsPanel">

    <h3>Reader Settings</h3>

    <label>Font Size:</label>
    <select onchange="changeFontSize()" id="fontSize">
        <option value="20px">Small</option>
        <option value="24px" selected>Default</option>
        <option value="32px">Large</option>
    </select>

    <label>Font:</label>
    <select onchange="changeFontFamily()" id="fontFamily">
        <option value="Georgia">Georgia</option>
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
    </select>

    <label>Line Height:</label>
    <select onchange="changeLineHeight()" id="lineHeight">
        <option value="1.5">Compact</option>
        <option value="1.8" selected>Normal</option>
        <option value="2.2">Relaxed</option>
    </select>

    <label>Width:</label>
    <select onchange="changeReadingWidth()" id="readingWidth">
        <option value="600px">Narrow</option>
        <option value="800px" selected>Normal</option>
        <option value="95%">Wide</option>
    </select>

</div>

<!-- =====================================================
     4. MAIN CHAPTER DISPLAY AREA
===================================================== -->
<div class="content" id="reader">

    <div id="chapterTitle">Loading...</div>

    <div id="chapterText" class="chapter">
        Loading chapter...
    </div>

    <!-- Navigation (updated by JS) -->
    <div class="nav">
        <a href="#">← Previous</a>
        <a href="/Lost-Novel/">Home</a>
        <a href="#">Next →</a>
    </div>

</div>

<!-- =====================================================
     5. UI CONTROLS (MODE + SETTINGS TOGGLE)
===================================================== -->
<script>
function toggleMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem(
        "mode",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}

function toggleSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "flex" ? "none" : "flex";
}
</script>

<!-- =====================================================
     6. SETTINGS SYSTEM (SAVE USER PREFERENCES)
===================================================== -->
<script>
function changeFontSize() {
    const v = document.getElementById("fontSize").value;
    document.getElementById("reader").style.fontSize = v;
    localStorage.setItem("fontSize", v);
}

function changeFontFamily() {
    const v = document.getElementById("fontFamily").value;
    document.getElementById("reader").style.fontFamily = v;
    localStorage.setItem("fontFamily", v);
}

function changeLineHeight() {
    const v = document.getElementById("lineHeight").value;
    document.getElementById("reader").style.lineHeight = v;
    localStorage.setItem("lineHeight", v);
}

function changeReadingWidth() {
    const v = document.getElementById("readingWidth").value;
    document.getElementById("reader").style.maxWidth = v;
    localStorage.setItem("readingWidth", v);
}
</script>

<!-- =====================================================
     7. LOAD SAVED SETTINGS ON PAGE LOAD
===================================================== -->
<script>
window.onload = function () {

    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
    }

    const fs = localStorage.getItem("fontSize");
    if (fs) document.getElementById("reader").style.fontSize = fs;

    const ff = localStorage.getItem("fontFamily");
    if (ff) document.getElementById("reader").style.fontFamily = ff;

    const lh = localStorage.getItem("lineHeight");
    if (lh) document.getElementById("reader").style.lineHeight = lh;

    const rw = localStorage.getItem("readingWidth");
    if (rw) document.getElementById("reader").style.maxWidth = rw;
};
</script>

<!-- =====================================================
     8. CHAPTER LOADER + NAVIGATION SYSTEM
===================================================== -->
<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file") || "/Lost-Novel/book1/ch001.txt";

/* Get chapter number from filename */
function getChapterNumber(file) {
    const match = file.match(/ch(\d+)\.txt/);
    return match ? parseInt(match[1]) : 1;
}

/* Build next/prev filename */
function buildChapterFile(num) {
    return `/Lost-Novel/book1/ch${String(num).padStart(3, "0")}.txt`;
}

let prev = null;
let next = null;

fetch(file)
    .then(res => res.text())
    .then(text => {

        localStorage.setItem("lastChapter", window.location.href);

        const lines = text.split("\n");

        const title = lines[0] || "Unknown Chapter";

        document.getElementById("topChapterTitle").innerText = title;
        document.getElementById("chapterTitle").innerText = title;
        document.getElementById("chapterText").innerText =
            lines.slice(1).join("\n");

        const current = getChapterNumber(file);
        prev = current > 1 ? buildChapterFile(current - 1) : null;
        next = buildChapterFile(current + 1);

        document.querySelector(".nav").innerHTML = `
            <a href="?file=${prev}">← Previous</a>
            <a href="/Lost-Novel/">Home</a>
            <a href="?file=${next}">Next →</a>
        `;
    });
</script>

<!-- =====================================================
     9. CHAPTER LIST DROPDOWN LOADER
===================================================== -->
<script>
function toggleChapterList() {
    const panel = document.getElementById("chapterPanel");

    if (panel.style.display === "block") {
        panel.style.display = "none";
    } else {
        panel.style.display = "block";
        loadChapterList();
    }
}

function loadChapterList() {
    fetch("/Lost-Novel/book1/chaplist.txt")
        .then(res => res.text())
        .then(text => {
            const lines = text.trim().split("\n");

            let html = "";

            lines.forEach(line => {
                const [file, title] = line.split("|");

                html += `
                    <a href="?file=/Lost-Novel/book1/${file.trim()}">
                        ${title.trim()}
                    </a>
                `;
            });

            document.getElementById("chapterPanel").innerHTML = html;
        });
}
</script>

</body>
</html>
