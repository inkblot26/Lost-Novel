<!DOCTYPE html>
<html>
<head>
    <title>Chapter Reader</title>

    <style>
        /* =====================================================
           1. BASE PAGE STYLE
           Global defaults for body and typography
        ===================================================== */
        body {
            margin: 0;
            background-color: #ffffff;
            color: #222;
            font-family: Georgia, serif;
        }

        /* =====================================================
           2. DARK MODE GLOBAL STYLE
           Applied when body has "dark" class
        ===================================================== */
        body.dark {
            background-color: #0f0f0f;
            color: #e6e6e6;
        }

        body.dark h1 {
            color: #fff;
        }

        /* =====================================================
           3. TOP BAR (HEADER)
           Contains book title + chapter title + buttons
        ===================================================== */
        .top-bar {
            position: sticky;
            top: 0;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 15px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            z-index: 50;
        }

        body.dark .top-bar {
            background: #121212;
            border-bottom: 1px solid #333;
        }

        /* Left side book info */
        .book-info {
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-weight: bold;
            font-size: 14px;
            color: inherit;
            text-decoration: none;
        }

        .book-title:hover {
            opacity: 0.7;
        }

        .chapter-title {
            font-size: 13px;
            opacity: 0.7;
        }

        /* Buttons in top bar */
        .top-buttons button {
            margin-left: 10px;
            padding: 6px 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        /* =====================================================
           4. MAIN READER AREA
           Where chapter text is displayed
        ===================================================== */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;

            font-size: 24px;
            line-height: 1.8;
        }

        .chapter {
            white-space: pre-wrap;
            text-align: justify;

            /* Disable text selection */
            user-select: none;
            cursor: default;
        }

        /* =====================================================
           5. NAVIGATION SECTION
           Previous / Home / Next links
        ===================================================== */
        .nav {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ccc;

            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .nav a {
            text-decoration: none;
            color: #111;
            font-weight: normal;
        }

        body.dark .nav a {
            color: #e6e6e6;
        }

        /* =====================================================
           6. SETTINGS PANEL (HIDDEN BY DEFAULT)
           Font size, font type, spacing, width
        ===================================================== */
        .reader-settings {
            position: fixed;
            top: 60px;
            right: 15px;

            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 8px;

            display: none;
            flex-direction: column;
            gap: 8px;

            font-size: 14px;
            z-index: 100;
        }

        body.dark .reader-settings {
            background: rgba(30,30,30,0.95);
        }

        .reader-settings h3 {
            margin: 0;
            text-align: center;
            font-size: 14px;
        }

        /* =====================================================
           7. CHAPTER DROPDOWN PANEL
           Chapter list inside top bar button
        ===================================================== */
        .chapter-wrapper {
            position: relative;
            display: inline-block;
        }

        .chapter-panel {
            position: absolute;
            top: 40px;
            left: 0;

            width: 280px;
            max-height: 70vh;
            overflow-y: auto;

            background: rgba(255,255,255,0.98);
            border: 1px solid #ddd;
            border-radius: 8px;

            padding: 10px;
            display: none;

            z-index: 200;
        }

        body.dark .chapter-panel {
            background: rgba(30,30,30,0.98);
            border: 1px solid #333;
        }

        .chapter-panel a {
            display: block;
            padding: 6px 8px;

            text-decoration: none;
            color: #111;
            border-radius: 5px;
        }

        body.dark .chapter-panel a {
            color: #e6e6e6;
        }

        .chapter-panel a:hover {
            background: rgba(0,0,0,0.05);
        }

        body.dark .chapter-panel a:hover {
            background: rgba(255,255,255,0.08);
        }

        /* =====================================================
           MOBILE HEADER IMPROVEMENTS
           Makes the top bar easier to read on phones.
        ===================================================== */
        @media (max-width: 768px) {
        
            /* Bigger header with wrapping */
            .top-bar {
                padding: 14px 16px;
                align-items: flex-start;
                gap: 12px;
            }
        
            /* Larger book title */
            .book-title {
                font-size: 18px;
            }
        
            /* Larger chapter title */
            .chapter-title {
                font-size: 15px;
                margin-top: 3px;
            }
        
            /* Keep buttons together */
            .top-buttons {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
        
            /* Bigger buttons */
            .top-buttons button {
                margin: 0;
                padding: 10px 14px;
                font-size: 15px;
            }
        
            /* Slightly smaller settings panel */
            .reader-settings {
                right: 10px;
                top: 72px;
                width: 220px;
            }
        
            /* Better chapter dropdown */
            .chapter-panel {
                width: 240px;
                left: auto;
                right: 0;
            }
        }
    </style>
</head>

<body>

<!-- =====================================================
     TOP BAR (VISIBLE HEADER)
===================================================== -->
<div class="top-bar">

    <!-- Book info -->
    <div class="book-info">
        <a href="/Lost-Novel/" class="book-title">
            Lost: Ashes of Vengeance
        </a>
        <div class="chapter-title" id="topChapterTitle">
            Loading...
        </div>
    </div>

    <!-- Buttons -->
    <div class="top-buttons">

        <!-- Chapter dropdown -->
        <div class="chapter-wrapper">
            <button onclick="toggleChapterList()" id="chapterBtn">
                📖 Chapters
            </button>
            <div id="chapterPanel" class="chapter-panel"></div>
        </div>

        <button onclick="toggleSettings()">⚙ Settings</button>
        <button onclick="toggleMode()">🌙 / ☀</button>
    </div>
</div>

<!-- =====================================================
     SETTINGS PANEL (FONT / SIZE / WIDTH CONTROLS)
===================================================== -->
<div class="reader-settings" id="settingsPanel">

    <h3>Reader Settings</h3>

    <label>Font Size:</label>
    <select id="fontSize" onchange="changeFontSize()">
        <option value="20px">Extra Small</option>
        <option value="24px" selected>Small</option>
        <option value="28px">Medium</option>
        <option value="32px">Large</option>
        <option value="36px">Extra Large</option>
    </select>

    <label>Font:</label>
    <select id="fontFamily" onchange="changeFontFamily()">
        <option value="Georgia">Georgia</option>
        <option value="'Times New Roman'">Times New Roman</option>
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
    </select>

    <label>Line Height:</label>
    <select id="lineHeight" onchange="changeLineHeight()">
        <option value="1.5">Compact</option>
        <option value="1.8" selected>Normal</option>
        <option value="2.1">Relaxed</option>
        <option value="2.4">Spacious</option>
    </select>

    <label>Reading Width:</label>
    <select id="readingWidth" onchange="changeReadingWidth()">
        <option value="600px">Narrow</option>
        <option value="800px" selected>Normal</option>
        <option value="1000px">Wide</option>
        <option value="95%">Full Screen</option>
    </select>
</div>

<!-- =====================================================
     MAIN READER CONTENT
===================================================== -->
<div class="content" id="reader">

    <div id="chapterTitle" style="text-align:center; margin-bottom:30px;">
        Loading...
    </div>

    <div class="chapter" id="chapterText">
        Loading chapter...
    </div>

    <div class="nav">
        <a href="#">← Previous</a>
        <a href="/Lost-Novel/">Home</a>
        <a href="#">Next →</a>
    </div>
</div>

<!-- =====================================================
     MODE + SETTINGS TOGGLES
===================================================== -->
<script>
function toggleMode() {
    document.body.classList.toggle("dark");

    localStorage.setItem(
        "mode",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}

function toggleSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "flex" ? "none" : "flex";
}
</script>

<!-- =====================================================
     SETTINGS LOGIC (APPLY USER PREFERENCES)
===================================================== -->
<script>
function changeFontSize() {
    const v = document.getElementById("fontSize").value;
    document.getElementById("reader").style.fontSize = v;
    localStorage.setItem("fontSize", v);
}

function changeFontFamily() {
    const v = document.getElementById("fontFamily").value;
    document.getElementById("reader").style.fontFamily = v;
    localStorage.setItem("fontFamily", v);
}

function changeLineHeight() {
    const v = document.getElementById("lineHeight").value;
    document.getElementById("reader").style.lineHeight = v;
    localStorage.setItem("lineHeight", v);
}

function changeReadingWidth() {
    const v = document.getElementById("readingWidth").value;
    document.getElementById("reader").style.maxWidth = v;
    localStorage.setItem("readingWidth", v);
}
</script>

<!-- =====================================================
     LOAD SAVED SETTINGS ON PAGE OPEN
===================================================== -->
<script>
window.onload = function () {

    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
    }

    const fs = localStorage.getItem("fontSize");
    if (fs) document.getElementById("reader").style.fontSize = fs;

    const ff = localStorage.getItem("fontFamily");
    if (ff) document.getElementById("reader").style.fontFamily = ff;

    const lh = localStorage.getItem("lineHeight");
    if (lh) document.getElementById("reader").style.lineHeight = lh;

    const rw = localStorage.getItem("readingWidth");
    if (rw) document.getElementById("reader").style.maxWidth = rw;
};
</script>

<!-- =====================================================
     CHAPTER LOADING + NAVIGATION SYSTEM
===================================================== -->
<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file") || "/Lost-Novel/book1/ch001.txt";

function getChapterNumber(file) {
    const match = file.match(/ch(\d+)\.txt/);
    return match ? parseInt(match[1]) : 1;
}

function buildChapterFile(num) {
    return `/Lost-Novel/book1/ch${String(num).padStart(3, "0")}.txt`;
}

let prev = null;
let next = null;

fetch(file)
    .then(res => res.text())
    .then(text => {

        localStorage.setItem("lastChapter", window.location.href);

        const lines = text.split("\n");

        const title = lines[0]?.trim() || "Unknown Chapter";

        document.getElementById("topChapterTitle").innerText = title;
        document.getElementById("chapterTitle").innerText = title;

        document.getElementById("chapterText").innerText =
            lines.slice(1).join("\n");

        localStorage.setItem("lastChapter", window.location.href);

        const savedScroll = localStorage.getItem("scroll_" + file);

        if (savedScroll) {
            setTimeout(() => {
                window.scrollTo(0, parseInt(savedScroll));
            }, 100);
        }

        const current = getChapterNumber(file);
        prev = current > 1 ? buildChapterFile(current - 1) : null;
        next = buildChapterFile(current + 1);

        document.querySelector(".nav").innerHTML = `
            <a href="?file=${prev}">← Previous</a>
            <a href="/Lost-Novel/">Home</a>
            <a href="?file=${next}">Next →</a>
        `;

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && prev) {
                window.location.href = "?file=" + prev;
            }
            if (e.key === "ArrowRight" && next) {
                window.location.href = "?file=" + next;
            }
        });
    })
    .catch(() => {
        document.getElementById("chapterText").innerText =
            "Failed to load chapter file.";
    });

window.addEventListener("scroll", () => {
    localStorage.setItem("scroll_" + file, window.scrollY);
});
</script>

<!-- =====================================================
     CHAPTER LIST DROPDOWN LOADER
===================================================== -->
<script>
function toggleChapterList() {
    const panel = document.getElementById("chapterPanel");

    if (panel.style.display === "block") {
        panel.style.display = "none";
    } else {
        panel.style.display = "block";
        loadChapterList();
    }
}

function loadChapterList() {
    fetch("/Lost-Novel/book1/chaplist.txt")
        .then(res => res.text())
        .then(text => {

            const lines = text.trim().split("\n");

            let html = "";

            lines.forEach(line => {
                const [file, title] = line.split("|");

                html += `
                    <a href="?file=/Lost-Novel/book1/${file.trim()}">
                        ${title.trim()}
                    </a>
                `;
            });

            document.getElementById("chapterPanel").innerHTML = html;
        });
}
</script>

</body>
</html>
